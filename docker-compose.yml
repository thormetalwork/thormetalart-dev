services:
  mysql:
    image: mysql:8.0
    container_name: thormetalart_mysql
    restart: always
    ports:
      - "127.0.0.1:3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - thormetalart_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thormetalart_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - thormetalart_network

  wordpress:
    build:
      context: ./docker/wordpress
      dockerfile: Dockerfile
    image: thormetalart_wordpress:6.9-php8.1-redis
    container_name: thormetalart_wordpress
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
    volumes:
      - ./data/wordpress:/var/www/html
    networks:
      - thormetalart_network
      - traefik-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-login.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.thormetalart.rule=Host(`thormetalart.com`) || Host(`www.thormetalart.com`) || Host(`panel.thormetalart.com`)"
      - "traefik.http.routers.thormetalart.entrypoints=websecure"
      - "traefik.http.routers.thormetalart.tls=true"
      - "traefik.http.routers.thormetalart.tls.certresolver=letsencrypt"
      - "traefik.http.routers.thormetalart.tls.domains[0].main=thormetalart.com"
      - "traefik.http.routers.thormetalart.tls.domains[0].sans=www.thormetalart.com,panel.thormetalart.com"
      - "traefik.http.routers.thormetalart.middlewares=security-headers@file,rate-limit@file"
      - "traefik.http.services.thormetalart.loadbalancer.server.port=80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: thormetalart_phpmyadmin
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    networks:
      - thormetalart_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.thormetalart-pma.rule=Host(`pma.thormetalart.com`)"
      - "traefik.http.routers.thormetalart-pma.entrypoints=websecure"
      - "traefik.http.routers.thormetalart-pma.tls=true"
      - "traefik.http.routers.thormetalart-pma.tls.certresolver=letsencrypt"
      - "traefik.http.routers.thormetalart-pma.middlewares=security-headers@file,rate-limit@file"
      - "traefik.http.services.thormetalart-pma.loadbalancer.server.port=80"

volumes:
  redis_data:

networks:
  thormetalart_network:
    driver: bridge
  traefik-public:
    external: true
